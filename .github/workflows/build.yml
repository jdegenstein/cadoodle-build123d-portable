name: build

on: 
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12.12"]
        os: [macos-15-intel, macos-14, ubuntu-latest, windows-latest]

        include:
          - os: ubuntu-latest
            platform_slug: linux-x86_64
            archive_ext: tar.gz
            DEL_PYTHON_LINK_DIR: ./pyinst/cpython-3.12-linux-x86_64-gnu
            PYTHON_REAL_DIR: ./pyinst/cpython-3.12.12-linux-x86_64-gnu

          - os: macos-14
            platform_slug: macos-arm64
            archive_ext: zip
            DEL_PYTHON_LINK_DIR: ./pyinst/cpython-3.12-macos-aarch64-none
            PYTHON_REAL_DIR: ./pyinst/cpython-3.12.12-macos-aarch64-none

          - os: macos-15-intel
            platform_slug: macos-x86_64
            archive_ext: zip
            DEL_PYTHON_LINK_DIR: ./pyinst/cpython-3.12-macos-x86_64-none
            PYTHON_REAL_DIR: ./pyinst/cpython-3.12.12-macos-x86_64-none

          - os: windows-latest
            platform_slug: windows-x86_64
            archive_ext: exe # Switched to exe for 7z SFX
            DEL_PYTHON_LINK_DIR: ./pyinst/cpython-3.12-windows-x86_64-none
            PYTHON_REAL_DIR: ./pyinst/cpython-3.12.12-windows-x86_64-none

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup/
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: shorten python path (all platforms)
        shell: bash
        run: |
          unlink ${{ matrix.DEL_PYTHON_LINK_DIR }}
          mv ${{ matrix.PYTHON_REAL_DIR }} ./py
          rm -rf ./pyinst
          
      - name: linux/mac install dependencies
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="${GITHUB_WORKSPACE}/uv:$PATH"
          rm -f ./py/lib/python3.12/EXTERNALLY-MANAGED
          # Install from local pyproject.toml first, then specific repos
          uv pip install . --python ./py
          uv pip install build123d ocp_vscode git+https://github.com/GarryBGoode/py_gearworks git+https://github.com/gumyr/bd_warehouse --python ./py
      
      - name: windows install dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export PATH="${GITHUB_WORKSPACE}/uv:$PATH"
          rm -f ./py/Lib/EXTERNALLY-MANAGED
          uv pip install . --python ./py
          uv pip install build123d ocp_vscode git+https://github.com/GarryBGoode/py_gearworks git+https://github.com/gumyr/bd_warehouse --python ./py

      - name: Create Archive
        shell: bash
        run: |
          # Sanitize branch/tag name for folders
          SAFE_REF="${GITHUB_REF_NAME////-}"
          ASSET_NAME="cadoodle-b123d_${SAFE_REF}-${{ matrix.platform_slug }}.${{ matrix.archive_ext }}"
          echo "RELEASE_ASSET_FILE=$ASSET_NAME" >> $GITHUB_ENV
          
          # Wrap files in a root directory to prevent messy extractions 
          WRAPPER_DIR="cadoodle-b123d_${SAFE_REF}"
          echo "WRAPPER_DIR=$WRAPPER_DIR" >> $GITHUB_ENV
          mkdir -p "$WRAPPER_DIR"
          
          mv uv py "$WRAPPER_DIR"/

          if [ "${{ matrix.archive_ext }}" == "tar.gz" ]; then
            tar -czf "$ASSET_NAME" "$WRAPPER_DIR"
          else
            if [ "$RUNNER_OS" == "Windows" ]; then
              7z a -sfx7z.sfx -mx=9 -mmt=on "$ASSET_NAME" "$WRAPPER_DIR"
            else
              zip -r -q "$ASSET_NAME" "$WRAPPER_DIR"
            fi
          fi

      - name: Extract and Test Artifact
        shell: bash
        run: |
          # Simulate end-user downloading and extracting the artifact
          mkdir test_env
          
          if [ "${{ matrix.archive_ext }}" == "tar.gz" ]; then
            tar -xzf "${{ env.RELEASE_ASSET_FILE }}" -C test_env
          else
            if [ "$RUNNER_OS" == "Windows" ]; then
              # Use 7z to extract the SFX executable quietly
              7z x "${{ env.RELEASE_ASSET_FILE }}" -o"test_env" -y
            else
              unzip -q "${{ env.RELEASE_ASSET_FILE }}" -d test_env
            fi
          fi
          
          # Point to the freshly extracted python executable
          if [ "$RUNNER_OS" == "Windows" ]; then
            export PORTABLE_PYTHON_EXE="$(pwd)/test_env/${{ env.WRAPPER_DIR }}/py/python.exe"
          else
            export PORTABLE_PYTHON_EXE="$(pwd)/test_env/${{ env.WRAPPER_DIR }}/py/bin/python"
          fi
          
          export PATH="${GITHUB_WORKSPACE}/test_env/${{ env.WRAPPER_DIR }}/uv:$PATH"
          
          # Run pytest ephemerally using uvx
          uvx pytest tests/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: cadoodle-build123d-portable-${{ matrix.os }}
          include-hidden-files: true
          # Now uploading the unarchived wrapper directory directly
          path: ${{ env.WRAPPER_DIR }}/

      - name: Upload Binary to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b #v3.0.1
        with:
          files: ${{ env.RELEASE_ASSET_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
